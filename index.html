<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炸船遊戲</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-top: 0;
      opacity: 0.9;
    }

    .game-container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .board-box {
      text-align: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 45px);
      grid-template-rows: repeat(8, 45px);
      gap: 4px;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .cell {
      width: 96px;
      height: 96px;
      background: #38bdf8;
      border-radius: 0;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .footer {
      margin-top: 30px;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <audio id="boomSound">
    <source src="https://actions.google.com/sounds/v1/explosions/explosion.ogg" type="audio/ogg">
  </audio>
  <h1>🚢 班級炸船遊戲</h1>
  <div class="random-player" id="randomPlayer">🎲 隨機抽選：尚未抽取</div>
  <button class="random-btn" onclick="pickRandomPlayer()">隨機抽第一位</button>
  <p>6×8 海域｜可記錄攻擊成功者</p>

  <div class="top-controls" id="columnButtons"></div>

  <div class="main-layout">
    <div>
      <div class="board" id="board"></div>
    </div>

    <div class="side-panel">
      <h2>🏆 攻擊成功排行榜</h2>

      <div class="input-box">
        <select id="studentId">
          <option value="">選擇號碼</option>
        </select>

        <select id="attackCount">
          <option value="1">+1 次</option>
          <option value="2">+2 次</option>
          <option value="3">+3 次</option>
          <option value="5">+5 次</option>
        </select>

        <button onclick="addAttack()">增加成功次數</button>
      </div>

      <div id="scoreList"></div>

      <button class="reset-btn" onclick="resetGame()">重置遊戲</button>
    </div>
  </div>

  <script>
    const ROWS = 8;
    const COLS = 6;
    let columnHits = Array(COLS).fill(0);

    const board = document.getElementById('board');
    const columnButtons = document.getElementById('columnButtons');
    const scoreList = document.getElementById('scoreList');

    let scores = {};

    function createBoard() {
      board.innerHTML = '';
      board.style.gridTemplateColumns = `repeat(${COLS}, 60px)`;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;

          cell.onclick = () => singleExplode(cell);

          board.appendChild(cell);
        }
      }
    }

    function createColumnButtons() {
      columnButtons.innerHTML = '';

      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.id = `colBtn-${c}`;
        updateColumnButton(c, btn);

        btn.onclick = () => {
          columnHits[c]++;

          if (columnHits[c] >= 3) {
            explodeColumn(c);
            columnHits[c] = 0;
          }

          updateColumnButton(c, btn);
        };

        columnButtons.appendChild(btn);
      }
    }

    function updateColumnButton(col, btn) {
      const count = columnHits[col];

      if (count === 0) btn.textContent = `第 ${col + 1} 排`;
      if (count === 1) btn.textContent = `第 ${col + 1} 排｜醜1`;
      if (count === 2) btn.textContent = `第 ${col + 1} 排｜醜2`;
    }

    function explodeColumn(col) {
      const cells = document.querySelectorAll(`.cell[data-col='${col}']`);
      let explodedCount = 0;

      cells.forEach((cell, index) => {
        if (cell.classList.contains('destroyed')) return;

        explodedCount++;

        setTimeout(() => {
          playBoom();
          cell.classList.add('hit');
          cell.classList.add('destroyed');
          cell.textContent = '💥';
        }, index * 120);
      });

      autoAddAttack(explodedCount);
    }

    function playBoom() {
      const sound = document.getElementById('boomSound');
      sound.currentTime = 0;
      sound.play();

      document.body.classList.add('screen-flash');

      setTimeout(() => {
        document.body.classList.remove('screen-flash');
      }, 180);
    }

    function pickRandomPlayer() {
      const number = Math.floor(Math.random() * 48) + 1;
      document.getElementById('randomPlayer').textContent = `🎲 隨機抽選：${number} 號`;
      document.getElementById('studentId').value = number;
    }

    function singleExplode(cell) {
      if (cell.classList.contains('destroyed')) return;

      playBoom();
          cell.classList.add('hit');
      cell.classList.add('destroyed');
      cell.textContent = '💥';

      autoAddAttack(1);
    }

    function autoAddAttack(count) {
      const id = document.getElementById('studentId').value;

      if (!id) return;

      if (!scores[id]) {
        scores[id] = 0;
      }

      scores[id] += count;

      renderScores();
    }

    function addAttack() {
      const id = document.getElementById('studentId').value;
      const count = parseInt(document.getElementById('attackCount').value);

      if (!id) return;

      if (!scores[id]) {
        scores[id] = 0;
      }

      scores[id] += count;

      renderScores();
    }

    function createStudentOptions() {
      const select = document.getElementById('studentId');

      for (let i = 1; i <= 48; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `${i} 號`;
        select.appendChild(option);
      }
    }

    function renderScores() {
      scoreList.innerHTML = '';

      const sorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1]);

      sorted.forEach(([id, score], index) => {
        const item = document.createElement('div');
        item.className = 'score-item';

        item.innerHTML = `
          <span>#${index + 1}　${id}</span>
          <strong>${score} 次</strong>
        `;

        scoreList.appendChild(item);
      });
    }

    function resetGame() {
      scores = {};
      columnHits = Array(COLS).fill(0);
      renderScores();

      document.querySelectorAll('.cell').forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('hit');
        cell.classList.remove('destroyed');
      });

      createColumnButtons();
    }

    createBoard();
    createColumnButtons();
    createStudentOptions();
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    .random-player {
      font-size: 28px;
      font-weight: bold;
      margin-top: 15px;
      margin-bottom: 10px;
      color: #facc15;
    }

    .random-btn {
      background: #f59e0b;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .main-layout {
      display: flex;
      justify-content: center;
      gap: 30px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .top-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .top-controls button,
    .reset-btn,
    .input-box button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .board {
      display: grid;
      gap: 14px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 18px;
    }

    .cell {
      width: 60px;
      height: 60px;
      background: #38bdf8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: 0.2s;
    }

    .hit {
      background: #ef4444 !important;
      transform: scale(1.15) rotate(4deg);
      box-shadow: 0 0 35px #ef4444;
      animation: boomAnim 0.3s;
    }

    @keyframes boomAnim {
      0% {
        transform: scale(0.7);
      }

      50% {
        transform: scale(1.25);
      }

      100% {
        transform: scale(1.15);
      }
    }

    .screen-flash {
      background: #7f1d1d !important;
    }
    }

    .destroyed {
      background: #7f1d1d !important;
      color: white;
    }

    .side-panel {
      width: 300px;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 18px;
      text-align: left;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-box select {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: white;
      color: black;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }
  </style>
</body>
</html>
