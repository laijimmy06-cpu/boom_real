<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級炸船遊戲</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
}

h1 {
  margin-bottom: 10px;
}

.random-player {
  font-size: 30px;
  color: #facc15;
  font-weight: bold;
  margin-bottom: 10px;
}

.random-btn {
  background: #f59e0b;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
  margin-bottom: 20px;
}

.main-layout {
  display: flex;
  gap: 30px;
  align-items: flex-start;
}

.left-panel,
.right-panel {
  width: 260px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 18px;
}

.board-section {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.top-controls {
  display: grid;
  grid-template-columns: repeat(6,96px);
  gap: 14px;
  margin-bottom: 14px;
}

.top-controls button {
  width: 96px;
  height: 60px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
}

.board {
  display: grid;
  grid-template-columns: repeat(6,96px);
  gap: 14px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 18px;
}

.cell {
  width: 96px;
  height: 96px;
  background: #38bdf8;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  cursor: pointer;
  transition: all 0.2s;
}

.hit {
  background: #ef4444 !important;
  transform: scale(1.12);
  box-shadow: 0 0 30px #ef4444;
}

.destroyed {
  background: #7f1d1d !important;
}

.screen-flash {
  background: #7f1d1d !important;
}

.score-item {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

select,
button {
  font-size: 16px;
}

.input-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.input-box select,
.input-box button {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.reset-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #dc2626;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<audio id="boomSound">
<source src="https://actions.google.com/sounds/v1/explosions/explosion.ogg" type="audio/ogg">
</audio>

<h1>🚢 班級炸船遊戲</h1>
<div class="random-player" id="randomPlayer">🎲 隨機抽選：尚未抽取</div>
<button class="random-btn" onclick="pickRandomPlayer()">隨機抽第一位</button>

<div class="main-layout">

<div class="left-panel">
<h2>📊 各排剩餘人數</h2>
<div id="columnRanking"></div>
</div>

<div class="board-section">
<div class="top-controls" id="columnButtons"></div>
<div class="board" id="board"></div>
</div>

<div class="right-panel">
<h2>🏆 玩家排行榜</h2>

<div class="input-box">
<select id="studentId">
<option value="">選擇號碼</option>
</select>
</div>

<div id="scoreList"></div>

<button class="reset-btn" onclick="resetGame()">重置遊戲</button>
</div>

</div>

<script>
const ROWS = 8;
const COLS = 6;

const board = document.getElementById('board');
const columnButtons = document.getElementById('columnButtons');
const scoreList = document.getElementById('scoreList');

let scores = {};
let columnHits = Array(COLS).fill(0);
let columnRemaining = Array(COLS).fill(ROWS);

function playBoom() {
  const sound = document.getElementById('boomSound');
  sound.currentTime = 0;
  sound.play();

  document.body.classList.add('screen-flash');

  setTimeout(() => {
    document.body.classList.remove('screen-flash');
  }, 150);
}

function pickRandomPlayer() {
  const number = Math.floor(Math.random() * 48) + 1;
  document.getElementById('randomPlayer').textContent = `🎲 隨機抽選：${number} 號`;
  document.getElementById('studentId').value = number;
}

function createBoard() {
  board.innerHTML = '';

  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.col = c;

      cell.onclick = () => singleExplode(cell);

      board.appendChild(cell);
    }
  }
}

function createButtons() {
  columnButtons.innerHTML = '';

  for(let c=0;c<COLS;c++) {
    const btn = document.createElement('button');

    updateButtonText(btn,c);

    btn.onclick = () => {
      columnHits[c]++;

      if(columnHits[c] >= 3) {
        explodeColumn(c);
        columnHits[c] = 0;
      }

      updateButtonText(btn,c);
    };

    columnButtons.appendChild(btn);
  }
}

function updateButtonText(btn,col) {
  if(columnHits[col] === 0) btn.textContent = `第${col+1}排`;
  if(columnHits[col] === 1) btn.textContent = `第${col+1}排｜醜1`;
  if(columnHits[col] === 2) btn.textContent = `第${col+1}排｜醜2`;
}

function explodeColumn(col) {
  const cells = document.querySelectorAll(`.cell[data-col='${col}']`);

  cells.forEach((cell,index) => {
    if(cell.classList.contains('destroyed')) return;

    setTimeout(() => {
      destroyCell(cell,col);
    },index*120);
  });
}

function singleExplode(cell) {
  if(cell.classList.contains('destroyed')) return;

  const col = Number(cell.dataset.col);
  destroyCell(cell,col);
}

function destroyCell(cell,col) {
  playBoom();

  cell.classList.add('hit');
  cell.classList.add('destroyed');
  cell.textContent = '💥';

  columnRemaining[col] = Math.max(0,columnRemaining[col]-1);

  const id = document.getElementById('studentId').value;

  if(id) {
    if(!scores[id]) scores[id] = 0;
    scores[id]++;
  }

  renderScores();
  renderColumnRanking();
}

function renderScores() {
  scoreList.innerHTML = '';

  const sorted = Object.entries(scores)
  .sort((a,b)=>b[1]-a[1]);

  sorted.forEach(([id,score],index)=>{
    const div = document.createElement('div');
    div.className = 'score-item';

    div.innerHTML = `
    <span>#${index+1} ${id}號</span>
    <strong>${score}次</strong>
    `;

    scoreList.appendChild(div);
  });
}

function renderColumnRanking() {
  const ranking = document.getElementById('columnRanking');
  ranking.innerHTML = '';

  columnRemaining.forEach((count,index)=>{
    const div = document.createElement('div');
    div.className = 'score-item';

    div.innerHTML = `
    <span>第${index+1}排</span>
    <strong>剩餘 ${count} 人</strong>
    `;

    ranking.appendChild(div);
  });
}

function createStudentOptions() {
  const select = document.getElementById('studentId');

  for(let i=1;i<=48;i++) {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = `${i}號`;
    select.appendChild(option);
  }
}

function resetGame() {
  scores = {};
  columnHits = Array(COLS).fill(0);
  columnRemaining = Array(COLS).fill(ROWS);

  createBoard();
  createButtons();
  renderScores();
  renderColumnRanking();
}

createBoard();
createButtons();
createStudentOptions();
renderColumnRanking();
</script>

</body>
</html>
